name: clinic_app
description: Multi-clinic management system for doctors, staff and admins.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  fl_chart: ^0.69.0          # dashboard charts (revenue, appointments)
  table_calendar: ^3.1.2     # appointment calendar view
  pdf: ^3.11.1                # generate invoice / prescription PDFs
  printing: ^5.13.2           # share/print PDFs
  image_picker: ^1.1.2        # patient photo / document capture
  go_router: ^14.2.7          # navigation & route guarding by role

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
